    // ========================================
    // REVENUE VIEW
    // ========================================
    function renderRevenueView(fiscalData, startDate, endDate) {
        // 1. Sort Data & Aggregate by Month
        // --- AGGREGATION LOGIC (Revenue) ---
        const monthlyMap = {};
        const parseValHelper = (val) => parseFloat(String(val).replace(/,/g, '')) || 0;

        fiscalData.forEach(row => {
            const date = new Date(row[0]);
            if (isNaN(date.getTime())) return;
            const key = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}`;

            if (!monthlyMap[key]) {
                monthlyMap[key] = {
                    date: row[0],
                    rev: 0, exp: 0, elec: 0,
                    prod: 0, dist: 0
                };
            }
            // Simply SUM (Accumulative)
            monthlyMap[key].rev += parseValHelper(row[7]);
            monthlyMap[key].exp += parseValHelper(row[8]);
            monthlyMap[key].elec += parseValHelper(row[9]);
            monthlyMap[key].prod += parseValHelper(row[3]);
            monthlyMap[key].dist += parseValHelper(row[4]);
        });

        const aggregatedData = Object.values(monthlyMap).map(d => {
            // Reconstruct Row
            return [d.date, 0, 0, d.prod, d.dist, 0, 0, d.rev, d.exp, d.elec];
        });

        const sortedData = [...aggregatedData].sort((a, b) => new Date(b[0]) - new Date(a[0]));
        const current = sortedData[0];
        const chronologicalData = [...aggregatedData].sort((a, b) => new Date(a[0]) - new Date(b[0]));
        // --- END AGGREGATION ---

        // Helper: Safe Parse Float
        const parseVal = (val) => parseFloat(String(val).replace(/,/g, '')) || 0;

        if (!current) {
            ['kpi-rev-total', 'kpi-rev-exp', 'kpi-rev-profit', 'kpi-rev-margin'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerText = '-';
            });
            return;
        }

        // --- KPI CALCULATION (Current Month) ---
        const curRev = parseVal(current[7]); // Col H
        const curExp = parseVal(current[8]); // Col I
        const curEbitda = curRev - curExp;
        const curMargin = curRev > 0 ? (curEbitda / curRev) * 100 : 0;

        // Previous Month Data
        const prevDate = new Date(current[0]);
        prevDate.setMonth(prevDate.getMonth() - 1);
        const prev = sortedData.find(row => {
            const d = new Date(row[0]);
            return d.getMonth() === prevDate.getMonth() && d.getFullYear() === prevDate.getFullYear();
        });

        const prevRev = prev ? parseVal(prev[7]) : 0;
        const prevExp = prev ? parseVal(prev[8]) : 0;
        const prevEbitda = prevRev - prevExp;
        const prevMargin = prevRev > 0 ? (prevEbitda / prevRev) * 100 : 0;

        // Update Header Month
        const currentMonthIdx = new Date(current[0]).getMonth();
        const lbl = document.getElementById('rev-month-label');
        if (lbl) lbl.innerText = THAI_MONTHS_SHORT[currentMonthIdx] + ' ' + (new Date(current[0]).getFullYear() + 543);

        // Update KPI Cards
        const updateCard = (id, val, prevVal, isPercent = false, inverse = false) => {
            const el = document.getElementById(id);
            // Format Large Numbers
            let dispVal = val;
            if (!isPercent && val > 1000000) dispVal = (val / 1000000).toFixed(2) + 'M';
            else if (!isPercent) dispVal = val.toLocaleString();
            else dispVal = val.toFixed(2) + '%';

            if (el) el.innerText = isPercent ? dispVal : '฿' + dispVal;

            const indEl = document.getElementById(id.replace('kpi-', 'ind-'));
            if (indEl) {
                if (!prev) {
                    indEl.innerText = '- vs prev month';
                    indEl.style.color = '#64748B';
                    return;
                }
                const diff = val - prevVal;
                // For Percent, diff is simple subtraction. For Value, calculate % change? User prefers value diff usually.
                // Let's stick to simple diff for consistency with prod view.
                const diffDisp = isPercent ? Math.abs(diff).toFixed(2) + '%'
                    : '฿' + Math.abs(diff).toLocaleString(undefined, { maximumFractionDigits: 0 });

                const icon = diff >= 0 ? '<i class="fa-solid fa-arrow-up"></i>' : '<i class="fa-solid fa-arrow-down"></i>';
                indEl.innerHTML = `${icon} ${diffDisp} vs prev month`;

                let isGood = inverse ? (diff <= 0) : (diff >= 0);
                indEl.style.color = isGood ? '#10B981' : '#EF4444';
            }
        };

        updateCard('kpi-rev-total', curRev, prevRev, false, false);
        updateCard('kpi-rev-exp', curExp, prevExp, false, true); // Exp up is bad
        updateCard('kpi-rev-profit', curEbitda, prevEbitda, false, false);
        updateCard('kpi-rev-margin', curMargin, prevMargin, true, false);


        // --- CHARTS ---
        const labels = chronologicalData.map(r => {
            const d = new Date(r[0]);
            return THAI_MONTHS_SHORT[d.getMonth()] + ' ' + (d.getFullYear() + 543).toString().substring(2);
        });

        const dataRev = chronologicalData.map(r => parseVal(r[7]));
        const dataExp = chronologicalData.map(r => parseVal(r[8]));
        const dataElec = chronologicalData.map(r => parseVal(r[9]));
        const dataProfit = dataRev.map((r, i) => r - dataExp[i]);

        // 1. Revenue vs Expenses Trend (Combo)
        renderChartGeneric('chart-rev-main', {
            labels: labels,
            datasets: [
                {
                    label: 'กำไร (EBITDA)',
                    data: dataProfit,
                    backgroundColor: 'rgba(139, 92, 246, 0.5)',
                    borderColor: '#8B5CF6',
                    borderWidth: 1,
                    type: 'bar',
                    order: 2
                },
                {
                    label: 'รายได้ (Revenue)',
                    data: dataRev,
                    borderColor: '#10B981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    type: 'line',
                    order: 1
                },
                {
                    label: 'รายจ่าย (Expenses)',
                    data: dataExp,
                    borderColor: '#EF4444',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    fill: false,
                    tension: 0.4,
                    type: 'line',
                    order: 0
                }
            ]
        }, {
            scales: {
                y: {
                    grid: { color: '#F1F5F9' },
                    ticks: { callback: v => '฿' + (v / 1000000).toFixed(1) + 'M' }
                }
            }
        }, 'bar'); // Base type bar for mixed

        // 2. Cumulative Revenue vs Target (If Target exists)
        // Calculate Cumulative
        let accRev = 0;
        const dataAccRev = dataRev.map(v => { accRev += v; return accRev; });

        // Fake Target if global TARGETS not found, or calculate linear target
        // Let's assume a static Monthly Target exists
        let monthlyTarget = 0;
        // Derive Fiscal Year from first data point
        let fy = new Date(chronologicalData[0][0]).getFullYear();
        if (new Date(chronologicalData[0][0]).getMonth() >= 9) fy++; // Fiscal Year logic

        if (typeof TARGETS !== 'undefined' && TARGETS.length > 0) {
            const tRow = TARGETS.find(r => r[0] == fy || r[0] == (fy + 543));
            if (tRow) monthlyTarget = (parseVal(tRow[1]) / 12);
        }

        let accTarget = 0;
        const dataAccTarget = labels.map(() => { accTarget += monthlyTarget; return accTarget; });

        renderChartGeneric('chart-rev-target-progress', {
            labels: labels,
            datasets: [
                {
                    label: 'รายได้สะสม (Act)',
                    data: dataAccRev,
                    borderColor: '#3B82F6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4
                },
                {
                    label: 'เป้าหมายสะสม (Target)',
                    data: dataAccTarget,
                    borderColor: '#94A3B8',
                    borderDash: [5, 5],
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                }
            ]
        }, {
            scales: {
                y: {
                    grid: { color: '#F1F5F9' },
                    ticks: { callback: v => '฿' + (v / 1000000).toFixed(1) + 'M' }
                }
            }
        }, 'line');

        // 3. Expense Structure (Current Year Total)
        const totalExp = dataExp.reduce((a, b) => a + b, 0);
        const totalElec = dataElec.reduce((a, b) => a + b, 0);
        const totalOther = totalExp - totalElec;

        renderChartGeneric('chart-rev-exp-struct', {
            labels: ['ค่าไฟฟ้า', 'ค่าใช้จ่ายอื่นๆ'],
            datasets: [{
                data: [totalElec, totalOther],
                backgroundColor: ['#F59E0B', '#64748B'],
                borderWidth: 0
            }]
        }, {
            cutout: '70%',
            plugins: {
                legend: { position: 'right' }
            }
        }, 'doughnut');

        // 4. Operating Ratio (Exp / Rev)
        const dataOpRatio = dataRev.map((r, i) => r > 0 ? (dataExp[i] / r) * 100 : 0);

        renderChartGeneric('chart-rev-op-ratio', {
            labels: labels,
            datasets: [{
                label: 'Operating Ratio (%)',
                data: dataOpRatio,
                borderColor: '#6366F1',
                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                fill: true,
                tension: 0.4
            }]
        }, {
            scales: {
                y: {
                    min: 0,
                    max: 120, // Usually around 60-90%
                    grid: { color: '#F1F5F9' },
                    ticks: { callback: v => v + '%' }
                }
            },
            plugins: {
                annotation: {
                    annotations: {
                        line1: {
                            type: 'line',
                            yMin: 80,
                            yMax: 80,
                            borderColor: '#EF4444',
                            borderWidth: 1,
                            borderDash: [6, 6],
                            label: { content: 'Threshold 80%', enabled: true, position: 'end' }
                        }
                    }
                }
            }
        }, 'line');
    }

    // ========================================
    // EXPENSES VIEW
    // ========================================
    function renderExpensesView(fiscalData, startDate, endDate) {
        // 1. Sort Data & Aggregate
        // --- AGGREGATION LOGIC (Expenses) ---
        const monthlyMap = {};
        const parseValHelper = (val) => parseFloat(String(val).replace(/,/g, '')) || 0;

        fiscalData.forEach(row => {
            const date = new Date(row[0]);
            if (isNaN(date.getTime())) return;
            const key = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}`;

            if (!monthlyMap[key]) {
                monthlyMap[key] = { date: row[0], rev: 0, exp: 0, elec: 0, prod: 0 };
            }
            // Simply SUM (Accumulative)
            monthlyMap[key].rev += parseValHelper(row[7]);
            monthlyMap[key].exp += parseValHelper(row[8]);
            monthlyMap[key].elec += parseValHelper(row[9]);
            monthlyMap[key].prod += parseValHelper(row[3]); // Water Prod for Efficiency Chart
        });

        const aggregatedData = Object.values(monthlyMap).map(d => {
            // Reconstruct Row
            return [d.date, 0, 0, d.prod, 0, 0, 0, d.rev, d.exp, d.elec];
        });

        const sortedData = [...aggregatedData].sort((a, b) => new Date(b[0]) - new Date(a[0]));
        const current = sortedData[0];
        const chronologicalData = [...aggregatedData].sort((a, b) => new Date(a[0]) - new Date(b[0]));
        // --- END AGGREGATION ---

        const parseVal = (val) => parseFloat(String(val).replace(/,/g, '')) || 0;

        if (!current) {
            ['kpi-exp-total', 'kpi-exp-elec', 'kpi-exp-other', 'kpi-exp-ratio'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerText = '-';
            });
            return;
        }

        // --- KPI DATA PREP ---
        const getKPIData = (row) => {
            if (!row) return null;
            const rev = parseVal(row[7]);
            const exp = parseVal(row[8]);
            const elec = parseVal(row[9]);
            const other = exp - elec;
            const ratio = rev > 0 ? (exp / rev) * 100 : 0;
            return { exp, elec, other, ratio };
        };

        const cur = getKPIData(current);

        // Previous Month
        const prevDate = new Date(current[0]);
        prevDate.setMonth(prevDate.getMonth() - 1);
        const prevRow = sortedData.find(row => {
            const d = new Date(row[0]);
            return d.getMonth() === prevDate.getMonth() && d.getFullYear() === prevDate.getFullYear();
        });
        const prev = getKPIData(prevRow);

            const el = document.getElementById(id);
            let dispVal = isPercent ? val.toFixed(2) + '%' : '฿' + (val > 1000000 ? (val / 1000000).toFixed(2) + 'M' : val.toLocaleString());
            if (el) el.innerText = dispVal;

            const indEl = document.getElementById(id.replace('kpi-', 'ind-'));
            if (indEl) {
                if (!prevObj) {
                    indEl.innerText = '- vs prev month';
                    indEl.style.color = '#64748B';
                    return;
                }
                const prevVal = prevObj[prevKey];
                const diff = val - prevVal;
                const diffDisp = isPercent ? Math.abs(diff).toFixed(2) + '%'
                    : '฿' + Math.abs(diff).toLocaleString(undefined, { maximumFractionDigits: 0 });

                const icon = diff >= 0 ? '<i class="fa-solid fa-arrow-up"></i>' : '<i class="fa-solid fa-arrow-down"></i>';
                indEl.innerHTML = `${icon} ${diffDisp} vs prev month`;

                // For Expenses: Up is Bad (Red), Down is Good (Green)
                // Inverse = true logic:
                let isGood = inverse ? (diff <= 0) : (diff >= 0);
                indEl.style.color = isGood ? '#10B981' : '#EF4444';

        updateCard('kpi-exp-total', cur.exp, prev, 'exp', false, true);

        updateCard('kpi-exp-ratio', cur.ratio, prev, 'ratio', true, true);

        // --- CHARTS ---
        const labels = chronologicalData.map(r => {

        const dataExp = chronologicalData.map(r => parseVal(r[8]));

        // 1. Expense Trend (Stacked: Elec + Other)

                },
                x: { stacked: true }
            }
        }, 'bar');

        // 2. Efficiency: Elec Cost vs Water Produced (Dual Axis)
        renderChartGeneric('chart-exp-efficiency', {
            labels: labels,
            datasets: [
                {
                    label: 'ค่าไฟฟ้า (บาท)',

                    order: 1,
                    yAxisID: 'y1'
                }
            ]
        }, {
            scales: {
                y: {
                    type: 'linear',

                    title: { display: true, text: 'ค่าไฟฟ้า (บาท)' },
                    ticks: { callback: v => (v / 1000).toFixed(0) + 'k' }
                },
                y1: {
                    type: 'linear',

                    grid: { drawOnChartArea: false },

                borderWidth: 0
            }]
        }, {
            cutout: '70%',
            plugins: { legend: { position: 'right' } }

        let accExp = 0;
        const dataAccExp = dataExp.map(v => { accExp += v; return accExp; });

        renderChartGeneric('chart-exp-cumulative', {

    // ========================================
    // DEBT VIEW (OUTSTANDING)
    // ========================================
    function renderDebtView(fiscalData, startDate, endDate) {
        const parseVal = (val) => parseFloat(String(val).replace(/,/g, '')) || 0;

        // --- 1. AGGREGATE DATA BY MONTH ---
        // Issue: Raw data has multiple rows per month (per user). We need to SUM them.
        const monthlyData = {};

        fiscalData.forEach(row => {
            const d = new Date(row[0]);
            // Create Key: YYYY-MM
            const key = d.getFullYear() + '-' + (d.getMonth() + 1).toString().padStart(2, '0');

            if (!monthlyData[key]) {
                monthlyData[key] = {
                    date: d,
                    rev: 0,
                    debtGov: 0,
                    debtPvt: 0
                };
            }
            // Accumulate
            monthlyData[key].rev += parseVal(row[7]);
            monthlyData[key].debtGov += parseVal(row[10]);
            monthlyData[key].debtPvt += parseVal(row[11]);
        });

        // Convert back to Array
        const aggregatedData = Object.values(monthlyData);

        // 2. Sort Data (Newest First for KPIs)
        const sortedData = [...aggregatedData].sort((a, b) => b.date - a.date);
        const current = sortedData[0];

        // Chronological for Charts
        const chronologicalData = [...aggregatedData].sort((a, b) => a.date - b.date);

        if (!current) {
            ['kpi-debt-total', 'kpi-debt-gov', 'kpi-debt-pvt', 'kpi-debt-ratio'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerText = '-';
            });
            return;
        }

        // --- KPI DATA PREP ---
        const getKPIData = (row) => {
            if (!row) return null;
            const rev = row.rev;
            const debtGov = row.debtGov;
            const debtPvt = row.debtPvt;
            const debtTotal = debtGov + debtPvt;
            const ratio = rev > 0 ? (debtTotal / rev) * 100 : 0;
            return { total: debtTotal, gov: debtGov, pvt: debtPvt, ratio };
        };

        const cur = getKPIData(current);

        // Previous Month

            return row.date.getMonth() === prevDate.getMonth() && row.date.getFullYear() === prevDate.getFullYear();

                indEl.innerHTML = `${icon} ${diffDisp} vs prev month`;

            }

                }

        // 3. Composition (Donut)
        const sumGov = dataGov.reduce((a, b) => a + b, 0);

    // Old AI Logic Removed

    function renderChartGeneric(id, data, extraOptions = {}, type = 'bar') {
        const ctx = document.getElementById(id);
        if (!ctx) return;

        if (CHART_INSTANCES[id]) {
            CHART_INSTANCES[id].destroy();
        }

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: { position: 'bottom', labels: { usePointStyle: true, font: { family: 'Sarabun' }, padding: 15 } },
                tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    titleFont: { family: 'Sarabun', size: 14 },
                    bodyFont: { family: 'Sarabun', size: 13 },
                    padding: 12,
                    cornerRadius: 8,
                    displayColors: true,
                    callbacks: {
                        label: function (context) {
                            let label = context.dataset.label || '';
                            if (label) label += ': ';

                            // Check if it's a target line (which already has value in label)
                            const isTargetLine = label.includes('เป้าหมาย') || label.includes('อัตราน้ำสูญเสีย (');

                            if (context.parsed.y !== null) {
                                if (!isTargetLine) {
                                    label += context.parsed.y.toLocaleString();
                                    // Add unit based on dataset label content
                                    if (label.includes('%') || label.includes('สูญเสีย')) label += '%';
                                } else {
                                    // For target line just show the label itself (e.g., "Target (25%)")
                                    // Remove the trailing ": " added above
                                    label = label.substring(0, label.length - 2);
                                }
                            }
                            return label;
                        }
                    }
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { font: { family: 'Sarabun' } } },
                y: { grid: { color: '#F1F5F9' }, ticks: { font: { family: 'Sarabun' } } }
            }
        };

        // Merge extra options
        const options = {
            ...commonOptions,
            ...extraOptions,
            scales: { ...commonOptions.scales, ...(extraOptions.scales || {}) },
            plugins: { ...commonOptions.plugins, ...(extraOptions.plugins || {}) },
            interaction: extraOptions.interaction || commonOptions.interaction
        };

        CHART_INSTANCES[id] = new Chart(ctx, {
            type: type,
            data: data,
            options: options
        });
    }

    // --- CONSUMERS VIEW LOGIC ---
    function renderConsumersView(fiscalData, startDate, endDate) {
        // 1. Sort Data & Aggregate by Month
        // --- AGGREGATION LOGIC (Consumers) ---
        const monthlyMap = {};
        const parseValHelper = (val) => parseFloat(String(val).replace(/,/g, '')) || 0;

        fiscalData.forEach(row => {
            const date = new Date(row[0]);
            if (isNaN(date.getTime())) return;
            const key = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}`;

            // Logic: Take LATEST record for the month (Snapshots)
            if (!monthlyMap[key] || new Date(row[0]) > new Date(monthlyMap[key].date)) {
                monthlyMap[key] = { date: row[0], consumers: parseValHelper(row[1]), newConsumers: parseValHelper(row[2]) };
            }
        });

        const aggregatedData = Object.values(monthlyMap).map(d => {
            // Reconstruct Row: [Date, Cons, New, ...]
            return [d.date, d.consumers, d.newConsumers, 0, 0, 0, 0, 0, 0, 0];
        });

        const sortedData = [...aggregatedData].sort((a, b) => new Date(b[0]) - new Date(a[0]));
        const current = sortedData[0];
        // --- END AGGREGATION ---

        if (!current) {
            ['cons-total', 'cons-new', 'cons-churn', 'cons-net'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerText = '-';
            });
            return;
        }

        const currentMonthIdx = new Date(current[0]).getMonth();
        const lbl = document.getElementById('cons-month-label');
        if (lbl) lbl.innerText = THAI_MONTHS_SHORT[currentMonthIdx] + ' ' + (new Date(current[0]).getFullYear() + 543);

        const curTotal = parseFloat(String(current[1]).replace(/,/g, '')) || 0;
        const curNew = parseFloat(String(current[2]).replace(/,/g, '')) || 0;

        const prevDate = new Date(current[0]);
        prevDate.setMonth(prevDate.getMonth() - 1);
        const prev = sortedData.find(row => {
            const d = new Date(row[0]);
            return d.getMonth() === prevDate.getMonth() && d.getFullYear() === prevDate.getFullYear();
        });

        const prevTotal = prev ? (parseFloat(String(prev[1]).replace(/,/g, '')) || 0) : 0;
        const prevNew = prev ? (parseFloat(String(prev[2]).replace(/,/g, '')) || 0) : 0;

        let churn = (prevTotal + curNew) - curTotal;
        if (churn < 0) churn = 0;
        const netIncrease = curTotal - prevTotal;

        const setVal = (id, val, prefix = '') => {
            const el = document.getElementById(id);
            if (el) el.innerText = prefix + val.toLocaleString();
        };

        setVal('cons-total', curTotal);
        setVal('cons-new', curNew, '+');
        setVal('cons-churn', churn, '-');
        setVal('cons-net', netIncrease, (netIncrease >= 0 ? '+' : ''));

        const calcTrend = (cur, pre, id, inverse = false) => {
            const el = document.getElementById(id);
            if (!el) return;
            if (!prev) { el.innerText = '-'; return; }
            const diff = cur - pre;
            const diffStr = Math.abs(diff).toLocaleString();
            const icon = diff >= 0 ? '<i class="fa-solid fa-arrow-up"></i>' : '<i class="fa-solid fa-arrow-down"></i>';
            el.innerHTML = `${icon} ${diffStr} vs prev month`;
            let isGood = inverse ? (diff <= 0) : (diff >= 0);
            el.style.color = isGood ? '#10B981' : '#EF4444';
        };

        calcTrend(curTotal, prevTotal, 'ind-cons-total');
        calcTrend(curNew, prevNew, 'ind-cons-new');

        let prevChurn = 0;
        const prevPrevDate = new Date(prevDate);
        prevPrevDate.setMonth(prevPrevDate.getMonth() - 1);
        const prevPrev = sortedData.find(row => {
            const d = new Date(row[0]);
            return d.getMonth() === prevPrevDate.getMonth() && d.getFullYear() === prevPrevDate.getFullYear();
        });
        if (prevPrev) {
            const ppTotal = parseFloat(String(prevPrev[1]).replace(/,/g, '')) || 0;
            prevChurn = (ppTotal + prevNew) - prevTotal;
            if (prevChurn < 0) prevChurn = 0;
        }
        calcTrend(churn, prevChurn, 'ind-cons-churn', true);
        calcTrend(netIncrease, (prevTotal - (prevPrev ? parseFloat(String(prevPrev[1]).replace(/,/g, '')) || 0 : 0)), 'ind-cons-net');

        const momGrowth = prevTotal > 0 ? ((curTotal - prevTotal) / prevTotal) * 100 : 0;
        const elMom = document.getElementById('cons-growth-mom');
        if (elMom) elMom.innerText = (momGrowth > 0 ? '+' : '') + momGrowth.toFixed(2) + '%';

        const startState = fiscalData[0];
        const startTotal = startState ? (parseFloat(String(startState[1]).replace(/,/g, '')) || 0) : curTotal;
        const ytdGrowth = startTotal > 0 ? ((curTotal - startTotal) / startTotal) * 100 : 0;
        const elYtd = document.getElementById('cons-growth-ytd');
        if (elYtd) elYtd.innerText = (ytdGrowth > 0 ? '+' : '') + ytdGrowth.toFixed(2) + '%';

        const monthCount = fiscalData.length;
        const avgNet = monthCount > 0 ? (curTotal - startTotal) / monthCount : 0;
        const elAvg = document.getElementById('cons-avg-inc');
        if (elAvg) elAvg.innerText = (avgNet >= 0 ? '+' : '') + Math.round(avgNet).toLocaleString();


        const currentYear = new Date().getFullYear();
        // Get unique years from actual data
        const yearMap = {};
        RAW_DATA.forEach(r => {
            if (!r || !r[0]) return; // Skip invalid rows
            const d = new Date(r[0]);
            if (isNaN(d.getTime())) return; // Skip invalid dates
            // Calculate Fiscal Year (Oct-Sep)
            const m = d.getMonth(); // 0-11
            let fiscalYear = d.getFullYear();
            if (m >= 9) { // Oct (9), Nov (10), Dec (11) -> Next Fiscal Year
                fiscalYear += 1;
            }

            if (isNaN(fiscalYear) || fiscalYear < 2000 || fiscalYear > 2100) return; // Skip invalid years

            // New Consumers (Column C -> Index 2)
            const newUsers = parseFloat(String(r[2]).replace(/,/g, '')) || 0;

            if (newUsers > 0) {
                // Logic: SUM by Fiscal Year (New Users Accumulation)
                if (!yearMap[fiscalYear]) {
                    yearMap[fiscalYear] = { val: 0, date: d };
                }
                yearMap[fiscalYear].val += newUsers;
            }
        });

        // Get years that have data, sorted
        const yearsWithData = Object.keys(yearMap).map(y => parseInt(y)).filter(y => !isNaN(y)).sort((a, b) => a - b);

        // Only render if we have data
        if (yearsWithData.length > 0) {
            const yearLabels = yearsWithData.map(y => (y + 543).toString());
            const yearData = yearsWithData.map(y => yearMap[y].val || 0);

            console.log('YearMap Data (New Users Sum):', yearMap);
            renderChart('chart-cons-year', 'bar', yearLabels, [{
                label: 'ผู้ใช้น้ำเพิ่มรายปี (ราย)',
                data: yearData,
                backgroundColor: '#3B82F6', // Blue for Annual Stats
                borderRadius: 4
            }]);
        } else {
            // Hide chart if no data
            const chartContainer = document.getElementById('chart-cons-year');
            if (chartContainer && chartContainer.parentElement) {
                chartContainer.parentElement.parentElement.style.display = 'none';
            }
        }

        const qMap = { 'Q1': 0, 'Q2': 0, 'Q3': 0, 'Q4': 0 };
        const getQ = (m) => {
            if (m >= 9) return 'Q1';
            if (m >= 0 && m <= 2) return 'Q2';
            if (m >= 3 && m <= 5) return 'Q3';
            return 'Q4';
        };

        fiscalData.forEach(r => {
            const m = new Date(r[0]).getMonth();
            qMap[getQ(m)] += (parseFloat(String(r[2]).replace(/,/g, '')) || 0);
        });

        renderChart('chart-cons-quarter', 'bar', ['Q1', 'Q2', 'Q3', 'Q4'], [
            { label: 'ปีงบประมาณ ' + (new Date(endDate).getFullYear() + 543), data: Object.values(qMap), backgroundColor: '#10B981', borderRadius: 4 }
        ]);

        const trendLabels = fiscalData.map(r => THAI_MONTHS_SHORT[new Date(r[0]).getMonth()]);
        const monthlyChurn = [];
        const monthlyNew = [];
        const monthlyNet = [];

        for (let i = 0; i < fiscalData.length; i++) {
            const r = fiscalData[i];
            const cTotal = parseFloat(String(r[1]).replace(/,/g, '')) || 0;
            const cNew = parseFloat(String(r[2]).replace(/,/g, '')) || 0;
            let pTotal = 0;
            if (i > 0) {
                pTotal = parseFloat(String(fiscalData[i - 1][1]).replace(/,/g, '')) || 0;
            } else {
                pTotal = cTotal - cNew;
            }
            let ch = (pTotal + cNew) - cTotal;
            if (ch < 0) ch = 0;
            monthlyChurn.push(ch);
            monthlyNew.push(cNew);
            monthlyNet.push(cNew - ch);
        }

        renderChart('chart-cons-trend', 'bar', trendLabels, [
            { label: 'เพิ่มใหม่', data: monthlyNew, backgroundColor: '#10B981', borderRadius: 4, stack: 'Stack 0' },
            { label: 'ลดลง', data: monthlyChurn, backgroundColor: '#EF4444', borderRadius: 4, stack: 'Stack 1' },
            { label: 'เพิ่มสุทธิ', data: monthlyNet, type: 'line', borderColor: '#F59E0B', tension: 0.4, yAxisID: 'y' }
        ]);

        // Calculate New vs Existing Users from current month
        const totalNewUsers = curNew; // From current month
        const totalExistingUsers = curTotal - curNew; // Total - New = Existing

        let typeLabels = ['ผู้ใช้น้ำเดิม', 'ผู้ใช้น้ำใหม่'];
        let typeData = [totalExistingUsers, totalNewUsers];
        let colors = ['#3B82F6', '#10B981']; // Blue for existing, Green for new

                }
            });

            const legendContainer = document.getElementById('cons-type-legend');
            if (legendContainer) {
                legendContainer.innerHTML = '';
                const totalUsers = typeData.reduce((a, b) => a + b, 0);

                    const item = document.createElement('div');
                    item.style.cssText = 'display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;';
                    item.innerHTML = `

                            <div style="width: 8px; height: 8px; border-radius: 50%; background: ${colors[i] || '#ccc'};"></div>
                            <span>${label}</span>
                        </div>
                        <div style="font-weight: 500;">${val.toLocaleString()} (${pct})</div>
                    `;
                    legendContainer.appendChild(item);
                });
            }
        }

        // === NEW CHARTS ===

        renderChart('chart-cons-total-trend', 'line', trendLabels, [{
            label: 'ผู้ใช้น้ำทั้งหมด',
            data: totalUsersData,
            borderColor: '#3B82F6',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointHoverRadius: 6
        }]);

        // Chart 6: MoM Growth Rate (Area Chart)
        const growthRates = [];
        for (let i = 0; i < fiscalData.length; i++) {
            if (i === 0) {
                growthRates.push(0); // First month has no previous data
            } else {
                const current = parseFloat(String(fiscalData[i][1]).replace(/,/g, '')) || 0;
                const previous = parseFloat(String(fiscalData[i - 1][1]).replace(/,/g, '')) || 0;
                const growth = previous > 0 ? ((current - previous) / previous) * 100 : 0;
                growthRates.push(growth);
            }
        }

        // Determine colors based on positive/negative growth
        const growthColors = growthRates.map(rate => rate >= 0 ? 'rgba(16, 185, 129, 0.6)' : 'rgba(239, 68, 68, 0.6)');

        const ctxGrowth = document.getElementById('chart-cons-growth');
        if (ctxGrowth) {

            if (CHART_INSTANCES['chart-cons-growth']) CHART_INSTANCES['chart-cons-growth'].destroy();

                    datasets: [{

                        tooltip: {

                            }

            });

        // Chart 7: Total vs New Users Comparison (Stacked Bar + Line)
        const existingUsersData = fiscalData.map((r, i) => {
            const total = parseFloat(String(r[1]).replace(/,/g, '')) || 0;

    // --- INTERACTIVE FORECAST LOGIC ---
    window.switchForecast = function (metric, btn) {
        if (!window.DASHBOARD_DATA || !window.DASHBOARD_DATA[metric]) return;

        // 1. UI Update
        document.querySelectorAll('.btn-fore').forEach(b => {
            b.classList.remove('active');
            b.style.background = 'white';
            b.style.color = '#64748B';
            b.style.borderColor = '#E2E8F0';
        });
        if (btn) {
            btn.classList.add('active');
            const color = window.DASHBOARD_DATA[metric].color;
            btn.style.background = color;
            btn.style.color = 'white';
            btn.style.borderColor = color;
        }

        // 2. Data Preparation
        const dataset = window.DASHBOARD_DATA[metric];
        const actualData = dataset.data;
        const labels = window.DASHBOARD_DATA.labels;

        // 3. Linear Regression Forecast (Project next 3 months)
        const forecastPoints = 3;
        const trendData = calculateTrend(actualData, forecastPoints);

        // Generate Labels
        const nextLabels = ["+1 เดือน", "+2 เดือน", "+3 เดือน"];
        const extendedLabels = [...labels, ...nextLabels];

        // 4. Update Chart
        const chart = CHART_INSTANCES['forecastChart'];
        if (chart) {
            const paddedActual = [...actualData, null, null, null];

            // Connected Trend
            const paddedTrend = new Array(actualData.length - 1).fill(null);
            if (actualData.length > 0) paddedTrend.push(actualData[actualData.length - 1]);
            paddedTrend.push(...trendData);

            chart.data.labels = extendedLabels;
            chart.data.datasets = [
                {
                    label: 'ข้อมูลจริง (Actual)',
                    data: paddedActual,
                    borderColor: dataset.color,
                    backgroundColor: hexToRgba(dataset.color, 0.2),
                    fill: true,
                    tension: 0.4,
                    borderWidth: 2,
                    pointRadius: 4,
                    borderRadius: 6, // for bar mode
                    order: 1
                },
                {
                    label: 'พยากรณ์ (Forecast)',
                    data: paddedTrend,
                    borderColor: dataset.color,
                    borderDash: [5, 5],
                    pointRadius: 0,
                    borderWidth: 2,
                    fill: false,
                    tension: 0.4,
                    order: 0
                }
            ];

            // Hybrid Logic
            if (actualData.length <= 1) {
                chart.config.type = 'bar';
                chart.data.datasets[1].hidden = true;
            } else {
                chart.config.type = 'line';
                chart.data.datasets[1].hidden = false;
            }

            chart.update();

            // 5. Update Summary Text
            const lastActual = actualData[actualData.length - 1] || 0;
            const lastForecast = trendData[forecastPoints - 1] || 0;
            const growth = lastForecast - lastActual;
            const isPositive = growth >= 0;

            const icon = isPositive ? '<i class="fa-solid fa-arrow-trend-up" style="color: #10B981;"></i>' : '<i class="fa-solid fa-arrow-trend-down" style="color: #EF4444;"></i>';
            const trendWord = isPositive ? 'เพิ่มขึ้น' : 'ลดลง';
            const growthVal = Math.abs(growth);
            const valFmt = growthVal > 1000000 ? (growthVal / 1000000).toFixed(2) + 'M' : growthVal.toLocaleString();

            const summaryHtml = `${icon} <b>แนวโน้ม ${dataset.label}:</b> คาดการณ์ว่าจะ <b>${trendWord}</b> ประมาณ ${valFmt} ใน 3 เดือนข้างหน้า`;

            const summaryEl = document.getElementById('forecast-summary');
            if (summaryEl) summaryEl.innerHTML = summaryHtml;
        }
    };

    function calculateTrend(data, steps) {
        if (data.length < 2) return new Array(steps).fill(data[0] || 0);
        const n = data.length;
        let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
        for (let i = 0; i < n; i++) {
            sumX += i;
            sumY += data[i];
            sumXY += i * data[i];
            sumXX += i * i;
        }
        const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
        const intercept = (sumY - slope * sumX) / n;
        const forecast = [];
        for (let i = 1; i <= steps; i++) {
            forecast.push(slope * (n - 1 + i) + intercept);
        }
        return forecast;
    }

    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // --- SWOT ANALYSIS LOGIC ---
    function generateSWOT(avgLoss, colEff, netMargin, ebitda, consumersNew, totalRevenue, totalExpenses, totalDebt) {
        // Thresholds
        const TARGET_LOSS = 25; // Max allowed loss % (Adjusted for typical PWA)
        const TARGET_COLLECTION = 95; // Min collection %
        const TARGET_MARGIN = 20; // Min margin %

        let s = [], w = [], o = [], t = [];

        // 1. Strengths
        if (colEff >= TARGET_COLLECTION) s.push(`ประสิทธิภาพการจัดเก็บรายได้ <b>${colEff.toFixed(1)}%</b> (สูงกว่าเกณฑ์ ${TARGET_COLLECTION}%)`);
        if (netMargin >= TARGET_MARGIN) s.push(`อัตรากำไรสุทธิ (Net Margin) <b>${netMargin.toFixed(1)}%</b> สะท้อนการดำเนินงานที่แข็งแกร่ง`);
        if (consumersNew > 0) s.push(`ฐานผู้ใช้น้ำขยายตัวต่อเนื่อง <b>+${consumersNew}</b> ราย (สัญญาณการเติบโต)`);
        if (s.length === 0) s.push("รายได้ยังมีความมั่นคงในระดับปฏิบัติการ");

        // 2. Weaknesses
        if (avgLoss > TARGET_LOSS) w.push(`น้ำสูญเสียเฉลี่ย <b>${avgLoss.toFixed(1)}%</b> สูงกว่าเป้าหมาย (${TARGET_LOSS}%) ต้องเร่งตรวจสอบท่อ`);
        if (colEff < TARGET_COLLECTION) w.push(`การจัดเก็บรายได้ <b>${colEff.toFixed(1)}%</b> ต่ำกว่าเกณฑ์ ต้องติดตามหนี้ค้างชำระ`);
        if (totalDebt > (totalRevenue * 0.2)) w.push(`หนี้ค้างชำระรวมสูงถึง <b>${(totalDebt / 1000000).toFixed(2)}M</b> บาท (เสี่ยงหนี้สูญ)`);

        // 3. Opportunities
        if (totalRevenue > 0) o.push(`โอกาสจาก EEC: ยอดขายกลุ่มอุตสาหกรรมในพื้นที่ชลบุรีมีแนวโน้มเติบโต`);
        if (ebitda > 0) o.push(`มีกำไร EBITDA <b>${(ebitda / 1000000).toFixed(2)}M</b> เพียงพอสำหรับการลงทุน Smart Metering`);
        o.push("ขยายฐานลูกค้าใหม่ในพื้นที่จัดสรรที่มีศักยภาพสูง");

        // 4. Threats
        t.push(`ต้นทุนพลังงานผันผวน: ค่าไฟฟ้าส่งผลกระทบโดยตรงต่อต้นทุนการผลิต`);
        t.push("ความเสี่ยงภัยแล้งในพื้นที่ชลบุรีอาจกระทบต้นทุนน้ำดิบ");
        if (totalDebt > 10000000) t.push("ความเสี่ยงด้านสภาพคล่องจากลูกหนี้ค้างชำระสะสมนาน");

        // Render HTML
        const renderList = (arr) => arr.map(item => `<div style="margin-bottom: 6px;">- ${item}</div>`).join('');

        const setVal = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html || '- อยู่เกณฑ์ปกติ'; };

        setVal('swot-s', renderList(s));
        setVal('swot-w', renderList(w));
        setVal('swot-o', renderList(o));
        setVal('swot-t', renderList(t));
    }

            const search = document.getElementById('history-search').value.toLowerCase();
            const info = document.getElementById('history-info');

            // Map to preserve original index, filtering out Optimistic UI NULLs
            let items = RAW_DATA
                .map((r, i) => ({ data: r, idx: i }))
                .filter(item => item.data); // Filter out null/undefined data (e.g. deleted items)

            // Filter
            if (search) {
                items = items.filter(item => {
                    const d = new Date(item.data[0]);
                    const dateStr = d.toLocaleDateString('th-TH'); // e.g., 20/1/2569
                    const year = d.getFullYear(); // 2026
                    const yearTh = year + 543;
                    return dateStr.includes(search) || String(year).includes(search) || String(yearTh).includes(search) || String(item.data[0]).includes(search);
                });
            }

            // Sort by Index Descending (Latest/Bottom database row first)
            items.sort((a, b) => b.idx - a.idx);

            // Pagination
            const total = items.length;
            const maxPage = Math.ceil(total / histSize) || 1;
            if (histPage > maxPage) histPage = maxPage;
            if (histPage < 1) histPage = 1;

            const start = (histPage - 1) * histSize;
            const pageItems = items.slice(start, start + histSize);

            // Render using array.join() for better performance
            const rows = [];
            if (pageItems.length === 0) {
                rows.push('<tr><td colspan="13" style="text-align:center; padding: 20px; color: #64748B;">ไม่พบข้อมูลที่ค้นหา (No Match Found)</td></tr>');
            } else {
                pageItems.forEach((item, index) => {
                    const r = item.data;
                    const rev = parseVal(r[7]);
                    const exp = parseVal(r[8]);

                    // Safe Date Parsing with Consistent Format
                    let dateFmt = '-';
                    if (r[0]) {
                        // Helper to parse potential formats
                        const parseDate = (input) => {
                            if (input instanceof Date) return input;
                            if (typeof input !== 'string') return new Date(input);

                            // Handle DD/MM/YYYY or DD-MM-YYYY
                            if (input.match(/^\d{1,2}[\/-]\d{1,2}[\/-]\d{4}$/)) {
                                const parts = input.split(/[\/-]/);
                                // Assume DD/MM/YYYY
                                return new Date(parts[2], parts[1] - 1, parts[0]);
                            }
                            return new Date(input);
                        };

                        const d = parseDate(r[0]);
                        if (!isNaN(d.getTime())) {
                            // Format: d MMM yyyy (Thai) e.g., 8 ม.ค. 2567
                            dateFmt = d.toLocaleDateString('th-TH', {
                                year: 'numeric',
                                month: 'short',
                                day: 'numeric'
                            });
                        } else {
                            dateFmt = String(r[0]); // Fallback if strictly unparseable
                        }
                    }

                    // Badge for the VERY FIRST item in the list (Latest)
                    let dateContent = dateFmt;
                    // Since we sort by Index DESC, the first item in the first page is the absolute latest
                    if (histPage === 1 && index === 0) {
                        dateContent += ` <span style="background: #DCFCE7; color: #166534; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #bbf7d0; margin-left: 6px; font-weight: 600;">LATEST</span>`;
                    }

                    rows.push(`
                        <tr style="border-bottom: 1px solid #F1F5F9;">
                            <td style="padding: 12px 10px; color: #334155;">${dateContent}</td>
                            <td style="padding: 12px 10px; text-align: right;">${parseVal(r[1]).toLocaleString()}</td>
                            <td style="padding: 12px 10px; text-align: right; color: #10B981;">+${parseVal(r[2]).toLocaleString()}</td>
                            <td style="padding: 12px 10px; text-align: right;">${formatCompact(parseVal(r[3]))}</td>
                            <td style="padding: 12px 10px; text-align: right;">${formatCompact(parseVal(r[4]))}</td>
                            <td style="padding: 12px 10px; text-align: right; color: #64748B;">${formatCompact(parseVal(r[5]))}</td>
                            <td style="padding: 12px 10px; text-align: right; font-weight: 500; color: ${parseVal(r[6]) > 25 ? '#EF4444' : '#10B981'}">${parseVal(r[6]).toFixed(2)}%</td>
                            <td style="padding: 12px 10px; text-align: right; color: #10B981;">${formatCompact(rev)}</td>
                            <td style="padding: 12px 10px; text-align: right; color: #EF4444;">${formatCompact(exp)}</td>
                            <td style="padding: 12px 10px; text-align: right; color: #F59E0B;">${formatCompact(parseVal(r[9]))}</td>
                            <td style="padding: 12px 10px; text-align: right; color: #8B5CF6;">${formatCompact(parseVal(r[10]))}</td>
                            <td style="padding: 12px 10px; text-align: right; color: #EC4899;">${formatCompact(parseVal(r[11]))}</td>

                            <td style="padding: 12px 4px; text-align: center; position: sticky; right: 0; background: white; z-index: 10;">
                                <div style="display: flex; gap: 8px; justify-content: center;">
                                    <button onclick="openEditModal(${item.idx})" style="border: none; background: #EFF6FF; color: #3B82F6; cursor: pointer; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="deleteRecord(${item.idx})" style="border: none; background: #FEF2F2; color: #EF4444; cursor: pointer; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `);
                });
            }

            // Use array.join() for final rendering (much faster than concatenation)
            tbody.innerHTML = rows.join('');

            // Update Info
            info.innerText = `Showing ${pageItems.length > 0 ? start + 1 : 0}-${start + pageItems.length} of ${total}`;

            document.getElementById('btn-prev').disabled = histPage === 1;
            document.getElementById('btn-next').disabled = histPage === maxPage;
        }); // Close requestAnimationFrame
    }

            return;
        }

        const search = document.getElementById('history-search').value.toLowerCase();

        const parseVal = (v) => parseFloat(String(v).replace(/,/g, '')) || 0;

        let items = RAW_DATA
            .map((r, i) => ({ data: r, idx: i }))
            .filter(item => item.data); // Filter out nulls

        if (search) {
            items = items.filter(item => {
                const d = new Date(item.data[0]);
                const dateStr = d.toLocaleDateString('th-TH');
                const year = d.getFullYear();
                const yearTh = year + 543;
                return dateStr.includes(search) || String(year).includes(search) || String(yearTh).includes(search) || String(item.data[0]).includes(search);
            });
        }

        // Sort DESC (Latest first)
        items.sort((a, b) => b.idx - a.idx);

        if (items.length === 0) {
            alert('ไม่พบข้อมูลตามเงื่อนไขค้นหา (No matching data to export)');

            msg.innerHTML = `ค้นพบข้อมูล <b>${count}</b> รายการ<br>ยอดรวมผู้ใช้น้ำ: <b>${users}</b> ราย`;

    function confirmExport() {
        const items = window.TEMP_EXPORT_ITEMS;
        if (!items || items.length === 0) return;

        document.getElementById('modal-export').style.display = 'none';

        const parseVal = (v) => parseFloat(String(v).replace(/,/g, '')) || 0;

        // Robust Date Formatter
        const toThaiDate = (v) => {
            if (!v) return '-';
            const d = new Date(v);
            if (isNaN(d.getTime())) return `"${String(v)}"`; // Return raw if invalid
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear() + 543;
            return `"${day}/${month}/${year}"`;
        };

        // BOM for Excel to read UTF-8 correctly
        let csvContent = "\uFEFF";

        // Header
        const header = [
            "วันที่ (Date)", "ผู้ใช้น้ำ (Users)", "ผู้ใช้น้ำเพิ่ม (New)",
            "น้ำผลิต (Prod)", "น้ำจำหน่าย (Dist)", "น้ำฟรี (Free)", "สูญเสีย % (Loss)",
            "รายได้ (Rev)", "รายจ่าย (Exp)", "ค่าไฟ (Elec)",
            "หนี้ราชการ (Gov)", "หนี้เอกชน (Pvt)"
        ];
        csvContent += header.join(",") + "\n";

        // Rows
        items.forEach(item => {
            const r = item.data;
            const row = [
                // Date - Use safe formatter
                toThaiDate(r[0]),
                // Numbers (cleaned)
                parseVal(r[1]),
                parseVal(r[2]),
                parseVal(r[3]),
                parseVal(r[4]),
                parseVal(r[5]),
                parseVal(r[6]).toFixed(2) + '%',
                parseVal(r[7]),
                parseVal(r[8]),
                parseVal(r[9]),
                parseVal(r[10]),
                parseVal(r[11])
            ];
            csvContent += row.join(",") + "\n";
        });

        // Create Download Link
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `DataHistory_${new Date().toISOString().slice(0, 10)}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function parseVal(val) {
        if (typeof val === 'number') return val;
        if (!val) return 0;
        return parseFloat(String(val).replace(/,/g, '')) || 0;
    }
    function formatCompact(num) {
        if (!num) return '0';
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(2) + 'k';
        return num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

        const icon = type === 'success' ? '<i class="fa-solid fa-check-circle" style="font-size: 24px;"></i>' : (type === 'error' ? '<i class="fa-solid fa-circle-exclamation" style="font-size: 24px;"></i>' : '<i class="fa-solid fa-circle-info" style="font-size: 24px;"></i>');

        container.appendChild(toast);

        const iconEl = document.getElementById('loading-icon');

        function updateStep() {
            if (currentStep >= steps.length) return;

            const step = steps[currentStep];

            // Update icon with fade effect
            iconEl.style.opacity = '0';
            setTimeout(() => {
                iconEl.className = `fa-solid ${step.icon} fa-spin`;
                iconEl.style.color = step.color;
                iconEl.style.opacity = '1';
            }, 150);

            // Update text
            textEl.style.opacity = '0';
            setTimeout(() => {
                textEl.textContent = step.text;
                textEl.style.opacity = '1';
            }, 150);

            // Update progress bar
            const progress = ((currentStep + 1) / steps.length) * 100;
            progressBar.style.width = progress + '%';
            progressBar.style.background = `linear-gradient(90deg, ${step.color}, ${steps[(currentStep + 1) % steps.length].color})`;

            currentStep++;

            if (currentStep < steps.length) {
                setTimeout(updateStep, 2000); // Change step every 2 seconds
            }
        }

        // Start animation
        setTimeout(updateStep, 1500);
    }

    // ========================================
    // TARGETS MANAGEMENT LOGIC
    // ========================================

    let currentTargetPage = 1;
    const targetsPerPage = 10;

    function renderTargetsView() {
        const tbody = document.getElementById('targets-table-body');
        if (!tbody) return;

        // Ensure TARGETS are loaded from cache if empty check
        if (!TARGETS || TARGETS.length === 0) {
            const cached = localStorage.getItem('PWA_DATA_CACHE');
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    if (parsed.targets) TARGETS = parsed.targets;
                } catch (e) { console.error('Cache parse error', e); }
            }
        }

        if (!TARGETS || TARGETS.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 24px; color: #94A3B8;">ไม่พบข้อมูลเป้าหมาย (No Targets Found)</td></tr>';
            // Also remove pagination footer if exists
            const footer = document.getElementById('targets-pagination-footer');
            if (footer) footer.remove();
            return;
        }

        // Sort by Fiscal Year Descending
        const sortedTargets = [...TARGETS].sort((a, b) => b[0] - a[0]);

        // Pagination Logic
        const totalPages = Math.ceil(sortedTargets.length / targetsPerPage);
        if (currentTargetPage > totalPages) currentTargetPage = totalPages;
        if (currentTargetPage < 1) currentTargetPage = 1;

        const startIndex = (currentTargetPage - 1) * targetsPerPage;
        const endIndex = startIndex + targetsPerPage;
        const pageData = sortedTargets.slice(startIndex, endIndex);

        tbody.innerHTML = '';
        pageData.forEach((row, index) => {
            const year = row[0];
            // Format: [Year, Rev, EBITDA, Cons, Loss]
            const rev = parseFloat(row[1]) || 0;
            const ebitda = parseFloat(row[2]) || 0;
            const cons = parseFloat(row[3]) || 0;
            const loss = parseFloat(row[4]) || 0;

            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid #F1F5F9';

            // Highlight newest item (First item on Page 1)
            let yearDisplay = `<span style="font-weight: 600;">${year}</span>`;
            if (currentTargetPage === 1 && index === 0) {
                yearDisplay += ` <span style="background: #E0F2FE; color: #0284C7; font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; margin-left: 8px; border: 1px solid #BAE6FD;">Latest</span>`;
                tr.style.background = '#F8FAFC'; // Light background for latest
            }

            tr.innerHTML = `
                <td style="padding: 16px; color: #334155;">${yearDisplay}</td>
                <td style="padding: 16px; color: #64748B;">฿${rev.toLocaleString()}</td>
                <td style="padding: 16px; color: #64748B;">฿${ebitda.toLocaleString()}</td>
                <td style="padding: 16px; color: #64748B;">+${cons.toLocaleString()}</td>
                <td style="padding: 16px; color: #64748B;">${loss.toFixed(2)}%</td>
                <td style="padding: 16px; text-align: center;">
                    <button onclick="editTarget('${year}')" style="background: none; border: none; cursor: pointer; color: #3B82F6; margin-right: 12px; font-size: 1rem;" title="แก้ไข">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button onclick="deleteTargetConfirmation('${year}')" style="background: none; border: none; cursor: pointer; color: #EF4444; font-size: 1rem;" title="ลบ">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        renderTargetPagination(sortedTargets.length, totalPages);
    }

    function renderTargetPagination(totalItems, totalPages) {
        let footer = document.getElementById('targets-pagination-footer');
        const container = document.querySelector('#view-targets .glass-panel:last-child'); // The table panel

        if (!footer) {
            footer = document.createElement('div');
            footer.id = 'targets-pagination-footer';
            footer.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid #F1F5F9; margin-top: 16px;';
            if (container) container.querySelector('.table-container').after(footer);
        }

        const startItem = ((currentTargetPage - 1) * targetsPerPage) + 1;
        const endItem = Math.min(currentTargetPage * targetsPerPage, totalItems);

        footer.innerHTML = `
            <div style="font-size: 0.85rem; color: #64748B;">
                แสดง ${startItem}-${endItem} จาก ${totalItems} รายการ
            </div>
            <div style="display: flex; gap: 8px;">
                <button onclick="changeTargetPage(-1)" ${currentTargetPage === 1 ? 'disabled' : ''} 
                    style="padding: 6px 12px; border: 1px solid #E2E8F0; background: ${currentTargetPage === 1 ? '#F8FAFC' : 'white'}; color: #64748B; border-radius: 6px; cursor: ${currentTargetPage === 1 ? 'not-allowed' : 'pointer'};">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: #EFF6FF; color: #3B82F6; border-radius: 6px; font-weight: 600; font-size: 0.85rem;">
                    ${currentTargetPage}
                </div>
                <button onclick="changeTargetPage(1)" ${currentTargetPage === totalPages ? 'disabled' : ''} 
                    style="padding: 6px 12px; border: 1px solid #E2E8F0; background: ${currentTargetPage === totalPages ? '#F8FAFC' : 'white'}; color: #64748B; border-radius: 6px; cursor: ${currentTargetPage === totalPages ? 'not-allowed' : 'pointer'};">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        `;
    }

    function changeTargetPage(direction) {
        currentTargetPage += direction;
        renderTargetsView();
    }

    function editTarget(year) {
        // Find target
        const target = TARGETS.find(r => r[0] == year);
        if (!target) return;

        const modal = document.getElementById('modal-target-edit');
        const form = document.getElementById('form-target-edit');
        if (!modal || !form) return;

        // Populate Modal Form
        form.querySelector('[name="fiscal_year"]').value = target[0];
        form.querySelector('[name="target_revenue"]').value = target[1];
        form.querySelector('[name="target_ebitda"]').value = target[2];
        form.querySelector('[name="target_new_consumers"]').value = target[3];
        form.querySelector('[name="target_loss_pct"]').value = target[4];

        // Show Modal
        const btn = form.querySelector('button[type="submit"]');
        if (btn) {
            console.log('Resetting edit button state for year:', year);
            btn.innerHTML = 'บันทึกการแก้ไข';
            btn.disabled = false;
            btn.style.background = '#3B82F6'; // Force blue
            btn.style.cursor = 'pointer';
            btn.style.opacity = '1';
        }
        modal.style.display = 'flex';
    }

    let targetToDelete = null;

    function deleteTargetConfirmation(year) {
        targetToDelete = year;
        document.getElementById('delete-target-year').innerText = year;
        document.getElementById('modal-target-delete').style.display = 'flex';
    }

    function confirmDeleteTarget() {
        if (!targetToDelete) return;

        const originalText = document.getElementById('btn-confirm-delete-target').innerText;
        document.getElementById('btn-confirm-delete-target').innerText = 'กำลังลบ...';

        if (typeof google === 'undefined') {
            alert('Cannot delete in local mode');
            return;
        }

        google.script.run
            .withSuccessHandler(res => {
                const response = JSON.parse(res);
                if (response.success) {
                    // Close Modal
                    document.getElementById('modal-target-delete').style.display = 'none';
                    document.getElementById('btn-confirm-delete-target').innerText = originalText;

                    // Show Success
                    document.getElementById('modal-success-title').innerText = 'ลบข้อมูลสำเร็จ';
                    document.getElementById('modal-success-msg').innerText = response.message;
                    document.getElementById('modal-success').style.display = 'flex';

                    // Update UI
                    TARGETS = TARGETS.filter(t => t[0] != targetToDelete);
                    renderTargetsView();
                    fetchRealData();
                    targetToDelete = null;
                } else {
                    alert('Error: ' + response.message);
                    document.getElementById('btn-confirm-delete-target').innerText = originalText;
                }
            })
            .withFailureHandler(e => {
                alert('Failed: ' + e);
                document.getElementById('btn-confirm-delete-target').innerText = originalText;
            })
            .deleteTarget(targetToDelete);
    }

    // Handle Edit Modal Submission
    const formEditTarget = document.getElementById('form-target-edit');
    if (formEditTarget) {
        formEditTarget.addEventListener('submit', function (e) {
            e.preventDefault();

            const formData = new FormData(formEditTarget);
            const data = {
                fiscal_year: formData.get('fiscal_year'),
                target_revenue: parseFloat(formData.get('target_revenue')) || 0,
                target_ebitda: parseFloat(formData.get('target_ebitda')) || 0,
                target_new_consumers: parseInt(formData.get('target_new_consumers')) || 0,
                target_loss_pct: parseFloat(formData.get('target_loss_pct')) || 0
            };

            const submitBtn = formEditTarget.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> บันทึก...';
            submitBtn.disabled = true;

            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler(response => {
                        const res = JSON.parse(response);
                        submitBtn.innerHTML = 'บันทึกการแก้ไข';
                        submitBtn.disabled = false;

                        if (res.success) {
                            // Close Edit Modal
                            document.getElementById('modal-target-edit').style.display = 'none';

                            // Show Success Modal
                            document.getElementById('modal-success-title').textContent = 'บันทึกสำเร็จ';
                            document.getElementById('modal-success-msg').textContent = 'ปรับปรุงข้อมูลเป้าหมายเรียบร้อยแล้ว';
                            document.getElementById('modal-success').style.display = 'flex';

                            // Update UI Local
                            const existingIdx = TARGETS.findIndex(t => t[0] == data.fiscal_year);
                            const newRow = [
                                parseInt(data.fiscal_year),
                                parseFloat(data.target_revenue),
                                parseFloat(data.target_ebitda),
                                parseInt(data.target_new_consumers),
                                parseFloat(data.target_loss_pct)
                            ];

                            if (existingIdx >= 0) {
                                TARGETS[existingIdx] = newRow;
                            }
                            renderTargetsView();
                            fetchRealData();
                        } else {
                            alert('เกิดข้อผิดพลาด: ' + res.message);
                        }
                    })
                    .withFailureHandler(err => {
                        alert('Error: ' + err);
                        submitBtn.innerHTML = 'บันทึกการแก้ไข';
                        submitBtn.disabled = false;
                    })
                    .saveTarget(data);
            }
        });
    }

    // Handle Targets Form Submission (New Entry)
    const formTargets = document.getElementById('form-targets');
    if (formTargets) {
        formTargets.addEventListener('submit', function (e) {
            e.preventDefault();


            const formData = new FormData(formTargets);
            const data = {
                fiscal_year: formData.get('fiscal_year'),
                target_revenue: parseFloat(formData.get('target_revenue')) || 0,
                target_ebitda: parseFloat(formData.get('target_ebitda')) || 0,
                target_new_consumers: parseInt(formData.get('target_new_consumers')) || 0,
                target_loss_pct: parseFloat(formData.get('target_loss_pct')) || 0
            };

            if (!data.fiscal_year) {
                alert('กรุณาระบุปีงบประมาณ');
                return;
            }

            const submitBtn = formTargets.querySelector('button[type="submit"]');
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังบันทึก...';
            submitBtn.disabled = true;

            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler(response => {
                        const res = JSON.parse(response);
                        submitBtn.innerHTML = '<i class="fa-solid fa-save"></i> บันทึกเป้าหมาย';
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('btn-warning');

                        if (res.success) {
                            document.getElementById('modal-success-title').textContent = 'สำเร็จ!';
                            document.getElementById('modal-success-msg').textContent = res.message;
                            document.getElementById('modal-success').style.display = 'flex';

                            formTargets.reset();

                            // Manual Update for instant feedback
                            // Check if existing in local TARGETS to update it before full reload
                            const existingIdx = TARGETS.findIndex(t => t[0] == data.fiscal_year);
                            const newRow = [
                                parseInt(data.fiscal_year),
                                parseFloat(data.target_revenue),
                                parseFloat(data.target_ebitda),
                                parseInt(data.target_new_consumers),
                                parseFloat(data.target_loss_pct)
                            ];

                            if (existingIdx >= 0) {
                                TARGETS[existingIdx] = newRow;
                            } else {
                                TARGETS.push(newRow);
                            }
                            renderTargetsView();

                            fetchRealData();
                        } else {
                            alert('เกิดข้อผิดพลาด: ' + res.message);
                        }
                    })
                    .withFailureHandler(err => {
                        alert('เกิดข้อผิดพลาด: ' + err);
                        submitBtn.innerHTML = '<i class="fa-solid fa-save"></i> บันทึกเป้าหมาย';
                        submitBtn.disabled = false;
                    })
                    .saveTarget(data);
            }
        });
    }

</script>
